server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/photoapp-access.log;
    error_log  /var/log/nginx/photoapp-error.log;

    # ── Viewer React app (root) ───────────────────────────────────────────────
    root  /projects/photoapp/frontend/viewer/build;
    index index.html;

    # ── API → Gunicorn ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Thumbnails and face crops are generated once then cached on disk;
        # tell browsers they can cache the response for 7 days.
        location /api/photos/thumbnail/ {
            proxy_pass       http://127.0.0.1:5000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            add_header       Cache-Control   "public, max-age=604800, stale-while-revalidate=86400";
        }

        location ~ ^/api/people/(clusters/[0-9]+/face-crop|faces/[0-9]+/crop) {
            proxy_pass       http://127.0.0.1:5000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            add_header       Cache-Control   "public, max-age=604800, stale-while-revalidate=86400";
        }
    }

    # ── Processed photos — served directly for performance ───────────────────
    location /processed_photos/ {
        alias   /projects/photoapp/backend/processed_photos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── Manager React app at /manager ─────────────────────────────────────────
    # Redirect bare /manager to /manager/ so relative asset paths resolve.
    location = /manager {
        return 301 /manager/;
    }

    # root /projects/photoapp/frontend means the URI is appended directly:
    #   /manager/static/js/file.js → frontend/manager/static/js/file.js
    # The manager is built with PUBLIC_URL=/manager so asset paths align.
    location /manager/ {
        root /projects/photoapp/frontend;
        try_files $uri $uri/ /manager/index.html;
    }

    # ── Static assets — long-lived cache for hashed bundles ──────────────────
    # Negative lookahead keeps /manager/ paths out; they are handled above by
    # the /manager/ prefix block which already has the correct root.
    location ~* ^(?!/manager/).*\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Media / font files ────────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Viewer SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
